name: 飲水機數據自動更新排程

on:
  # 1. 每天定時自動跑排程（以下設定為每天凌晨 0 點跑，可依需求調整）
  schedule:
    - cron: '0 * * * *'
  
  # 2. 允許你在 GitHub 網頁上手動點擊「Run workflow」測試觸發
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 步驟一：切換並載入你儲存庫（Repository）的程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步驟二：安裝 Python 執行環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-packages: '3.10'

      # 步驟三：用 pip 安裝 Playwright（擺脫 Node.js Module 找不到的問題）
      - name: Install Playwright Python package
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      # 步驟四：安裝 Playwright 專用的 Chromium 瀏覽器核心與 Linux 系統依賴檔
      - name: Ensure Playwright browsers are installed
        run: |
          python -m playwright install chromium --with-deps

      # 步驟五：執行爬蟲腳本並餵入 Supabase 的 Secrets 金鑰
      - name: Run Supabase Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python Update update_supabase.py
