name: 飲水機數據自動更新排程

on:
  schedule:
    # 每 1 小時自動執行一次 (世界標準時間 UTC)
    - cron: '0 */1 * * *'
  # 允許你在網頁上點擊按鈕手動執行更新
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 初始化 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝相依套件與 Playwright 瀏覽器
      run: |
        python -m pip install --upgrade pip
        pip install supabase requests playwright
        playwright install chromium

    - name: 執行更新爬蟲
      run: python update_supabase.py
