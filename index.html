
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飲水機觀測站</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 精緻的極簡風格全面回歸 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #fafafa; color: #1a1a1a; line-height: 1.5; }
        a { color: #0066cc; text-decoration: none; cursor: pointer; }
        header { background: #ffffff; border-bottom: 1px solid #eaeaea; padding: 15px 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 1.2rem; }
        .logo a { color: #1a1a1a; }
        nav a { margin-left: 15px; color: #666; font-size: 0.95rem; text-decoration: none; }
        nav a.active { color: #1a1a1a; font-weight: bold; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .loading { text-align: center; padding: 50px; color: #888; font-size: 1.1rem; }
        .hidden { display: none !important; }
        
        /* 區塊樣式 */
        .card { background: #ffffff; border: 1px solid #eaeaea; border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        h2 { font-size: 1.3rem; margin-bottom: 15px; font-weight: 600; color: #333; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        
        /* 首頁佈局調整：上下堆疊，寬螢幕不並排 */
        .home-grid-layout { display: flex; flex-direction: column; gap: 20px; margin-bottom: 25px; }
        .home-grid-layout .card { width: 100%; margin-bottom: 0; }

        /* 圖表專用容器 */
        .chart-container { position: relative; margin: auto; height: 320px; width: 100%; display: flex; justify-content: center; }
        
        /* 列表基礎（用於幹部排行等非全區塊點擊處） */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .list-item:last-child { border-bottom: none; }
        .rank-badge { font-weight: bold; margin-right: 10px; color: #888; min-width: 25px; display: inline-block; }
        .rank-1, .rank-2, .rank-3 { color: #1a1a1a; }
        .toggle-btn { display: block; width: 100%; text-align: center; padding: 10px; background: #f5f5f5; border: 1px solid #eaeaea; border-radius: 6px; margin-top: 10px; color: #555; font-size: 0.9rem; border: 1px solid #eaeaea; cursor: pointer; }
        
        /* 全站統一卡片互動感（全區塊點擊、Apple 式懸停位移與投影） */
        .clickable-card { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            background: #ffffff; 
            border: 1px solid #eaeaea; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none !important; 
            color: inherit; 
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.2s ease;
            margin-bottom: 15px;
        }
        .clickable-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 6px 16px rgba(0,0,0,0.06); 
        }
        .clickable-card:last-child { margin-bottom: 0; }
        
        /* 總覽入口大廳專用文字樣式 */
        .lobby-card-title { font-size: 1.15rem; font-weight: 600; color: #1a1a1a; }
        .lobby-card-desc { font-size: 0.85rem; color: #666; margin-top: 4px; }
        .lobby-arrow { font-size: 1.2rem; color: #ccc; font-weight: 300; }

        /* 詳細頁與社團專用雙欄排版 */
        .detail-layout { display: flex; flex-direction: column; gap: 24px; }
        @media(min-width: 768px) { .detail-layout { flex-direction: row; } }
        .detail-main { flex: 1.2; }
        .detail-side { flex: 0.8; display: flex; flex-direction: column; gap: 20px; }
        
        .detail-name { font-size: 1.6rem; font-weight: bold; margin-bottom: 8px; padding: 12px 15px; background: #f0f0f0; border-radius: 6px; color: #1a1a1a; line-height: 1.4; }
        .detail-img-container { width: 100%; background: #ffffff; border: 1px solid #eaeaea; border-radius: 6px; overflow: hidden; padding: 10px; text-align: center; }
        .detail-img { max-width: 100%; max-height: 550px; object-fit: contain; border-radius: 4px; }
        .detail-address-block { margin-top: 15px; font-size: 1rem; color: #333; background: #fff; border: 1px solid #eaeaea; padding: 12px 15px; border-radius: 6px; }
        .badge { display: inline-block; padding: 2px 8px; background: #e0f0ff; color: #0066cc; font-size: 0.8rem; font-weight: bold; border-radius: 4px; margin-left: 0; }
        
        /* 詳細頁專用膠囊分類標籤樣式 */
        .category-badges-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
        .gray-badge { display: inline-block; padding: 5px 14px; background: #f0f0f0; color: #1a1a1a; font-size: 0.85rem; font-weight: 500; border-radius: 20px; transition: all 0.2s; border: 1px solid #eaeaea; text-decoration: none !important; }
        .gray-badge:hover { background: #e8e8e8; transform: translateY(-1px); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* 社團舊版精華樣式優化 */
        .club-header { text-align: center; padding: 30px 0; border-bottom: 2px solid #1a1a1a; margin-bottom: 30px; }
        .club-header h1 { font-size: 2.2rem; font-weight: bold; color: #1a1a1a; letter-spacing: 1px; }
        
        .info-link-block { display: flex; align-items: center; gap: 10px; font-size: 1.05rem; }
        .info-link-block span { color: #666; width: 60px; display: inline-block; }
        
        .mission-list { padding-left: 20px; line-height: 1.8; font-size: 1.05rem; }
        .mission-list li { margin-bottom: 8px; font-weight: 500; }
        
        .exam-btn { display: block; text-align: center; padding: 15px; background: #1a1a1a; color: #ffffff; border-radius: 6px; font-weight: bold; font-size: 1.1rem; text-decoration: none; transition: background 0.2s; }
        .exam-btn:hover { background: #333; text-decoration: none; }

        /* 🔍 全部總覽頁面專用篩選欄樣式 */
        .search-filter-bar { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        @media(min-width: 576px) { .search-filter-bar { flex-direction: row; } }
        .search-input { flex: 1; padding: 10px 15px; border: 1px solid #eaeaea; border-radius: 6px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: #0066cc; }
        .sort-select { padding: 10px 15px; border: 1px solid #eaeaea; border-radius: 6px; font-size: 1rem; background-color: #ffffff; cursor: pointer; outline: none; }
        .sort-select:focus { border-color: #0066cc; }
        .all-water-list { display: flex; flex-direction: column; }
    </style>
</head>

    <script>
        const SUPABASE_URL = "https://azezhxlatzfgltzqguoa.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_FPMDx4PO77A99RzoVbs3XQ_P9R5aOFP";

        const ALL_CITIES = [
            "臺北市", "新北市", "基隆市", "桃園市", "新竹市", "新竹縣", "苗栗縣", "臺中市", 
            "彰化縣", "南投縣", "雲林縣", "嘉義市", "嘉義縣", "臺南市", "高雄市", "屏東縣", 
            "宜蘭縣", "花蓮縣", "臺東縣", "澎湖縣", "金門縣", "連江縣"
        ];

        let rawData = [];
        let showAllPersonalRanking = false; 
        let myPieChart = null;
        let userLocation = null; 

        function safeDecode(str) {
            try { return decodeURIComponent(str); } catch (e) { try { return unescape(str); } catch (err) { return str; } }
        }

        function parseFollowersCount(val) {
            if (!val) return 0;
            let str = val.toString().toUpperCase().trim();
            if (str.includes('K')) return parseFloat(str.replace('K', '')) * 1000;
            if (str.includes('M')) return parseFloat(str.replace('M', '')) * 1000000;
            let num = parseInt(str.replace(/,/g, ''), 10);
            return isNaN(num) ? 0 : num;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return null;
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function fetchInitialData() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/water_dispensers?select=*&order=created_at.asc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                if (!res.ok) throw new Error("API連線失敗");
                
                const supabaseData = await res.json();
                rawData = supabaseData.map(item => ({
                    id: item.threads_id || "",
                    name: item.name || "",
                    title: item.nickname || "", 
                    brand: item.brand || "",
                    brandUrl: item.brand_website || "",
                    city: item.city || "",
                    school: item.school_name || "", 
                    schoolUrl: item.school_website || "",
                    location: item.address || "", 
                    mapUrl: item.google_map_url || "",
                    lat: item.lat || null,
                    lng: item.lng || null,
                    isClub: item.is_club || "",
                    clubRole: item.club_role || "",
                    imageUrl: item.image_url || "",
                    followers: item.followers || 0,
                    updateTime: item.last_updated_time || "",
                    createTime: item.created_at || "" 
                }));
                document.getElementById('loading-view').classList.add('hidden');
                handleRouting();
            } catch (err) {
                console.error(err);
                document.getElementById('loading-view').innerText = "數據讀取失敗，請確認 Supabase API 連線狀態。";
            }
        }

        /* 🚀 【核心路由大修正】結構化路由映射 */
        function handleRouting() {
            const hash = window.location.hash || '#/';
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('nav a').forEach(n => n.classList.remove('active'));

            if (hash === '#/' || hash === '') {
                document.getElementById('nav-home').classList.add('active');
                renderHomePage();
            } else if (hash === '#/all') {
                document.getElementById('nav-all').classList.add('active');
                renderAllSubViews('lobby');
            } else if (hash === '#/all/list') {
                document.getElementById('nav-all').classList.add('active');
                renderAllSubViews('list');
            } else if (hash === '#/all/units') {
                document.getElementById('nav-all').classList.add('active');
                renderAllSubViews('units');
            } else if (hash === '#/all/cities') {
                document.getElementById('nav-all').classList.add('active');
                renderAllSubViews('cities');
            } else if (hash === '#/all/brands') {
                document.getElementById('nav-all').classList.add('active');
                renderAllSubViews('brands');
            } else if (hash.startsWith('#/unit/')) {
                document.getElementById('nav-all').classList.add('active');
                renderDrilldownPage(safeDecode(hash.substring(7)), 'unit');
            } else if (hash.startsWith('#/city/')) {
                document.getElementById('nav-all').classList.add('active');
                renderDrilldownPage(safeDecode(hash.substring(7)), 'city');
            } else if (hash.startsWith('#/brand/')) {
                document.getElementById('nav-all').classList.add('active');
                renderDrilldownPage(safeDecode(hash.substring(8)), 'brand');
            } else if (hash === '#/club') {
                document.getElementById('nav-club').classList.add('active');
                renderClubPage();
            } else if (hash.startsWith('#/user/')) {
                renderUserDetailPage(safeDecode(hash.substring(7)));
            }
        }

        function drawBrandChart() {
            const brandCounts = {};
            rawData.forEach(item => {
                let brandName = item.brand ? item.brand.trim() : "未標記";
                brandCounts[brandName] = (brandCounts[brandName] || 0) + 1;
            });
            const labels = Object.keys(brandCounts);
            const dataValues = Object.values(brandCounts);
            const backgroundColors = ['#4a7c59', '#68809a', '#bda88a', '#bd8a8a', '#8abdac', '#a38abd', '#8a9fbd', '#9e9e9e', '#cfb497', '#97b2cf'];
            const ctx = document.getElementById('brandPieChart').getContext('2d');
            if (myPieChart) myPieChart.destroy();

            myPieChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{ data: dataValues, backgroundColor: backgroundColors.slice(0, labels.length), borderWidth: 1, borderColor: '#ffffff' }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { font: { size: 13 }, boxWidth: 15 } }, tooltip: { callbacks: { label: function(context) { let label = context.label || ''; let value = context.raw || 0; let total = context.dataset.data.reduce((a, b) => a + b, 0); let percentage = Math.round((value / total) * 100); return ` ${label}: ${value} 台 (${percentage}%)`; } } } }
                }
            });
        }

        function renderHomePage() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('total-count').innerText = `${rawData.length} 台`;
            drawBrandChart();

            const personalSorted = [...rawData].sort((a, b) => parseFollowersCount(b.followers) - parseFollowersCount(a.followers));
            const displayPersonalLimit = showAllPersonalRanking ? personalSorted.length : 10;
            const personalListHtml = personalSorted.slice(0, displayPersonalLimit).map((item, idx) => `
                <div class="list-item">
                    <div>
                        <span class="rank-badge ${idx < 3 ? 'rank-' + (idx + 1) : ''}">${idx + 1}</span>
                        <a href="#/user/${encodeURIComponent(item.id)}">${item.name || item.id}</a>
                        <span style="font-size:0.85rem; color:#888; margin-left:8px;">(${item.school || '未填寫所屬單位'})</span>
                    </div>
                    <div style="font-weight:600;">${item.followers} 粉絲</div>
                </div>
            `).join('');
            document.getElementById('personal-ranking-list').innerHTML = personalListHtml || '<div style="color:#aaa;">目前尚無資料</div>';
            document.getElementById('toggle-personal-btn').innerText = showAllPersonalRanking ? "收起全臺排行 ↑" : "展開查看全臺排行 ↓";
        }

        document.getElementById('toggle-personal-btn').addEventListener('click', () => {
            showAllPersonalRanking = !showAllPersonalRanking;
            renderHomePage();
        });

        /* 🎛️ 總覽層級多路徑動態渲染處理 */
        function renderAllSubViews(subViewType) {
            document.getElementById('all-view').classList.remove('hidden');
            const titleEl = document.getElementById('all-view-main-title');
            const filterBar = document.getElementById('all-filter-bar');
            const backArea = document.getElementById('back-to-lobby-area');
            const container = document.getElementById('all-water-list-container');

            // 預設重置事件監聽與隱藏區塊
            filterBar.classList.add('hidden');
            backArea.classList.add('hidden');

            // 【1】大廳入口視圖 #/all
            if (subViewType === 'lobby') {
                titleEl.innerText = "總覽入口大廳";
                container.innerHTML = `
                    <a class="clickable-card" href="#/all/list">
                        <div>
                            <div class="lobby-card-title">全部清單</div>
                            <div class="lobby-card-desc">瀏覽全臺所有觀測站飲水機，支援多功能欄位排序與搜尋</div>
                        </div>
                        <div class="lobby-arrow">&rarr;</div>
                    </a>
                    <a class="clickable-card" href="#/all/units">
                        <div>
                            <div class="lobby-card-title">單位分類</div>
                            <div class="lobby-card-desc">依學校、機關等所屬單位查看建檔台數統計與排行</div>
                        </div>
                        <div class="lobby-arrow">&rarr;</div>
                    </a>
                    <a class="clickable-card" href="#/all/cities">
                        <div>
                            <div class="lobby-card-title">縣市分類</div>
                            <div class="lobby-card-desc">依臺灣各縣市行政區劃查看建檔台數分佈排行</div>
                        </div>
                        <div class="lobby-arrow">&rarr;</div>
                    </a>
                    <a class="clickable-card" href="#/all/brands">
                        <div>
                            <div class="lobby-card-title">品牌分類</div>
                            <div class="lobby-card-desc">依飲水機製造商品牌統計建檔純個數多寡與排名</div>
                        </div>
                        <div class="lobby-arrow">&rarr;</div>
                    </a>
                `;
                return;
            }

            // 非大廳狀態，開啟「返回大廳」的導覽列
            backArea.classList.remove('hidden');

            // 【2】全部清單子頁面 #/all/list
            if (subViewType === 'list') {
                titleEl.innerText = "全部飲水機清單";
                filterBar.classList.remove('hidden');

                const searchInput = document.getElementById('all-search-input');
                const sortSelect = document.getElementById('all-sort-select');

                const updateFilteredList = () => {
                    const query = searchInput.value.toLowerCase().trim();
                    const sortBy = sortSelect.value;

                    let filtered = rawData.filter((item, index) => {
                        item._originalIndex = index; 
                        return (item.name || "").toLowerCase().includes(query) || 
                               (item.school || "").toLowerCase().includes(query) || 
                               (item.city || "").toLowerCase().includes(query) || 
                               (item.brand || "").toLowerCase().includes(query) || 
                               (item.id || "").toLowerCase().includes(query);
                    });

                    filtered.sort((a, b) => {
                        const followersA = parseFollowersCount(a.followers);
                        const followersB = parseFollowersCount(b.followers);
                        if (sortBy === 'followers-desc') return followersB - followersA;
                        if (sortBy === 'followers-asc') return followersA - followersB;
                        if (sortBy === 'join-asc') return a._originalIndex - b._originalIndex;
                        if (sortBy === 'join-desc') return b._originalIndex - a._originalIndex;
                        if (sortBy === 'distance-asc') {
                            if (!userLocation) return 0;
                            const distA = calculateDistance(userLocation.lat, userLocation.lng, parseFloat(a.lat), parseFloat(a.lng));
                            const distB = calculateDistance(userLocation.lat, userLocation.lng, parseFloat(b.lat), parseFloat(b.lng));
                            if (distA === null) return 1;
                            if (distB === null) return -1;
                            return distA - distB;
                        }
                        return 0;
                    });

                    if (filtered.length === 0) {
                        container.innerHTML = `<div style="color:#aaa; text-align:center; padding:30px;">找不到符合關鍵字的飲水機。</div>`;
                        return;
                    }

                    container.innerHTML = filtered.map(item => {
                        let distStr = "";
                        if (userLocation && item.lat && item.lng) {
                            const d = calculateDistance(userLocation.lat, userLocation.lng, parseFloat(item.lat), parseFloat(item.lng));
                            distStr = d !== null ? `<span style="font-size:0.85rem; color:#0066cc; background:#e0f0ff; padding:2px 6px; border-radius:4px; margin-left:8px;">📍 ${d.toFixed(1)} km</span>` : "";
                        }
                        let dateHtml = "";
                        if ((sortBy === 'join-asc' || sortBy === 'join-desc') && item.createTime) {
                            dateHtml = `<div style="font-size:0.7rem; color:#999; margin-top:2px;">📅 ${item.createTime.substring(0, 10)}</div>`;
                        }

                        return `
                            <a class="clickable-card" href="#/user/${encodeURIComponent(item.id)}">
                                <div>
                                    <span style="font-weight:600; font-size:1.1rem; color:#0066cc;">${item.name || '未命名'}</span>
                                    ${distStr}
                                    <div style="font-size:0.85rem; color:#666; margin-top:4px;">
                                        ${item.school || '未標記單位'} ｜ ${item.city || '未標記縣市'} ｜ ${item.brand || '未標記品牌'}
                                    </div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-weight:bold; color:#1a1a1a; font-size:1.1rem;">${item.followers}</div>
                                    <div style="font-size:0.75rem; color:#888;">粉絲</div>
                                    ${dateHtml}
                                </div>
                            </a>
                        `;
                    }).join('');
                };

                sortSelect.onchange = function() {
                    if (this.value === 'distance-asc' && !userLocation) {
                        if (navigator.geolocation) {
                            navigator.geolocation.getCurrentPosition(
                                (position) => {
                                    userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                                    updateFilteredList();
                                },
                                () => { alert("無法取得定位，距離排序失效。"); sortSelect.value = "followers-desc"; updateFilteredList(); }
                            );
                        }
                    } else { updateFilteredList(); }
                };
                searchInput.oninput = updateFilteredList;
                updateFilteredList();

            // 【3】單位分類子頁面 #/all/units
            } else if (subViewType === 'units') {
                titleEl.innerText = "各所屬單位分類排行";
                const unitCounts = {};
                rawData.forEach(item => {
                    const unitName = item.school ? item.school.trim() : "未標記單位";
                    unitCounts[unitName] = (unitCounts[unitName] || 0) + 1;
                });
                const unitsSorted = Object.keys(unitCounts).map(name => ({ name, count: unitCounts[name] })).sort((a, b) => b.count - a.count);

                container.innerHTML = unitsSorted.map((unit, idx) => `
                    <a class="clickable-card" href="#/unit/${encodeURIComponent(unit.name)}">
                        <div>
                            <span class="rank-badge ${idx < 3 ? 'rank-' + (idx + 1) : ''}">${idx + 1}</span>
                            <span style="font-weight:600; font-size:1.1rem; color:#0066cc;">${unit.name}</span>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:bold; color:#1a1a1a; font-size:1.1rem;">${unit.count} 台</div>
                        </div>
                    </a>
                `).join('');

            // 【4】縣市分類子頁面 #/all/cities
            } else if (subViewType === 'cities') {
                titleEl.innerText = "各行政縣市分類排行";
                const cityCounts = {};
                ALL_CITIES.forEach(c => cityCounts[c] = 0);
                rawData.forEach(item => { if (cityCounts[item.city] !== undefined) cityCounts[item.city]++; });
                const citiesSorted = ALL_CITIES.map(c => ({ name: c, count: cityCounts[c] })).sort((a, b) => b.count - a.count);

                container.innerHTML = citiesSorted.map((city, idx) => `
                    <a class="clickable-card" href="#/city/${encodeURIComponent(city.name)}">
                        <div>
                            <span class="rank-badge ${idx < 3 ? 'rank-' + (idx + 1) : ''}">${idx + 1}</span>
                            <span style="font-weight:600; font-size:1.1rem; color:#0066cc;">${city.name}</span>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:bold; color:#1a1a1a; font-size:1.1rem;">${city.count} 台</div>
                            <div style="font-size:0.75rem; color:#888;">飲水機建檔台數</div>
                        </div>
                    </a>
                `).join('');

            // 【5】品牌分類子頁面 #/all/brands (純個數排行)
            } else if (subViewType === 'brands') {
                titleEl.innerText = "各製造品牌分類排行";
                const brandCounts = {};
                rawData.forEach(item => {
                    const brandName = item.brand ? item.brand.trim() : "未標記品牌";
                    brandCounts[brandName] = (brandCounts[brandName] || 0) + 1;
                });
                const brandsSorted = Object.keys(brandCounts).map(name => ({ name, count: brandCounts[name] })).sort((a, b) => b.count - a.count);

                container.innerHTML = brandsSorted.map((brand, idx) => `
                    <a class="clickable-card" href="#/brand/${encodeURIComponent(brand.name)}">
                        <div>
                            <span class="rank-badge ${idx < 3 ? 'rank-' + (idx + 1) : ''}">${idx + 1}</span>
                            <span style="font-weight:600; font-size:1.1rem; color:#0066cc;">${brand.name}</span>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:bold; color:#1a1a1a; font-size:1.1rem;">${brand.count} 台</div>
                            <div style="font-size:0.75rem; color:#888;">飲水機建檔台數</div>
                        </div>
                    </a>
                `).join('');
            }
        }

        /* 🔍 深度鑽取 (Drill-down) 頁面渲染：全站統一為 clickable-card 樣式 */
        function renderDrilldownPage(targetName, type) {
            document.getElementById('drilldown-view').classList.remove('hidden');
            const titleEl = document.getElementById('drilldown-view-title');
            const backLink = document.getElementById('drilldown-back-link');
            let filteredItems = [];

            if (type === 'unit') {
                titleEl.innerText = `🏢 所屬單位：${targetName}`;
                filteredItems = rawData.filter(item => (item.school ? item.school.trim() : "未標記單位") === targetName);
                backLink.href = "#/all/units";
                backLink.innerText = "← 返回單位排行清單";
            } else if (type === 'city') {
                titleEl.innerText = `📍 行政區：${targetName}`;
                filteredItems = rawData.filter(item => item.city === targetName);
                backLink.href = "#/all/cities";
                backLink.innerText = "← 返回縣市排行清單";
            } else if (type === 'brand') {
                titleEl.innerText = `🏷️ 製造品牌：${targetName}`;
                filteredItems = rawData.filter(item => (item.brand ? item.brand.trim() : "未標記品牌") === targetName);
                backLink.href = "#/all/brands";
                backLink.innerText = "← 返回品牌排行清單";
            }

            // 鑽取分頁一律默認採用「粉絲數量由多到少」排序
            filteredItems.sort((a, b) => parseFollowersCount(b.followers) - parseFollowersCount(a.followers));
            
            const listContainer = document.getElementById('drilldown-water-list');
            if (filteredItems.length === 0) {
                listContainer.innerHTML = `<div style="color:#aaa; text-align:center; padding:30px;">目前此類別下無任何資料。</div>`;
                return;
            }

            listContainer.innerHTML = filteredItems.map((item, idx) => `
                <a class="clickable-card" href="#/user/${encodeURIComponent(item.id)}">
                    <div>
                        <span class="rank-badge ${idx < 3 ? 'rank-' + (idx + 1) : ''}">${idx + 1}</span>
                        <span style="font-weight:600; font-size:1.1rem; color:#0066cc;">${item.name || '未命名'}</span>
                        <div style="font-size:0.85rem; color:#666; margin-top:4px;">
                            @${item.id} ｜ ${item.school || '未標記單位'} ｜ ${item.city || '未標記縣市'} ｜ ${item.brand || '未標記品牌'}
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:bold; color:#1a1a1a; font-size:1.1rem;">${item.followers}</div>
                        <div style="font-size:0.75rem; color:#888;">粉絲</div>
                    </div>
                </a>
            `).join('');
        }

        function renderClubPage() {
            document.getElementById('club-view').classList.remove('hidden');
            const officers = rawData.filter(item => item.clubRole && item.clubRole.trim() !== "");
            const roleOrder = { "社長": 1, "副社長": 2, "美宣": 3 };
            officers.sort((a, b) => (roleOrder[a.clubRole.trim()] || 99) - (roleOrder[b.clubRole.trim()] || 99));
            const officersHtml = officers.map(o => `
                <div style="padding: 12px 15px; background: #fafafa; border: 1px solid #eaeaea; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <span style="font-weight: bold; color: ${o.clubRole.trim() === '社長' ? '#b58900' : o.clubRole.trim() === '副社長' ? '#586e75' : '#0066cc'}; margin-right: 10px;">${o.clubRole}</span>
                        <a href="#/user/${encodeURIComponent(o.id)}" style="font-weight: 600;">${o.name || o.id}</a>
                    </div>
                </div>
            `).join('');
            document.getElementById('club-officers-container').innerHTML = officersHtml || '<div style="color:#aaa;">目前尚未設定幹部職位</div>';

            const members = rawData.filter(item => item.isClub === "慢" || item.isClub === "是");
            members.sort((a, b) => parseFollowersCount(b.followers) - parseFollowersCount(a.followers));

            const membersHtml = members.map((m, idx) => `
                <div class="list-item">
                    <div>
                        <span class="rank-badge">${idx+1}</span>
                        <a href="#/user/${encodeURIComponent(m.id)}">${m.name || m.id}</a>
                    </div>
                    <div style="font-size:0.9rem; color:#555;">${m.followers} 粉絲</div>
                </div>
            `).join('');
            document.getElementById('club-members-list').innerHTML = membersHtml || '<div style="color:#aaa;">目前尚無成員加入</div>';
        }

        function renderUserDetailPage(userId) {
            document.getElementById('user-view').classList.remove('hidden');
            const item = rawData.find(u => u.id === userId);
            if (!item) { document.getElementById('det-name').innerText = "找不到該飲水機資料"; return; }

            document.getElementById('det-name').innerText = item.name || "未命名飲水機";
            document.getElementById('det-img').src = item.imageUrl || "https://via.placeholder.com/400x400?text=No+Image";

            const locLink = document.getElementById('det-location-link');
            locLink.innerText = item.location || "未提供詳細地址";
            if (item.mapUrl) { 
                locLink.href = item.mapUrl;
                locLink.style.pointerEvents = "auto"; locLink.style.textDecoration = "underline"; 
            } else { 
                locLink.removeAttribute('href');
                locLink.style.pointerEvents = "none"; locLink.style.textDecoration = "none";
            }

            const schoolLink = document.getElementById('det-school-link');
            schoolLink.innerText = item.school || "-";
            if (item.schoolUrl) { 
                schoolLink.href = item.schoolUrl;
                schoolLink.style.textDecoration = "underline"; schoolLink.style.color = "#0066cc"; 
            } else { 
                schoolLink.removeAttribute('href');
                schoolLink.style.textDecoration = "none"; schoolLink.style.color = "#1a1a1a"; 
            }
            
            const brandLink = document.getElementById('det-brand-link');
            brandLink.innerText = item.brand || "未標記";
            if (item.brandUrl) { 
                brandLink.href = item.brandUrl;
                brandLink.style.textDecoration = "underline"; brandLink.style.color = "#0066cc"; brandLink.style.pointerEvents = "auto";
            } else { 
                brandLink.removeAttribute('href');
                brandLink.style.textDecoration = "none"; brandLink.style.color = "#1a1a1a"; brandLink.style.pointerEvents = "none";
            }
            
            const linkEl = document.getElementById('det-id-link');
            linkEl.innerText = `@${item.id}`; linkEl.href = `https://www.threads.net/@${item.id}`;

            // 🏷️ 【詳細頁標籤優化】嚴格按順序輸出：單位、縣市、品牌、社團連結膠囊
            const badgesContainer = document.getElementById('det-category-badges');
            let badgesHtml = "";
            if (item.school) {
                badgesHtml += `<a href="#/all/units" class="gray-badge">${item.school.trim()}</a>`;
            }
            if (item.city) {
                badgesHtml += `<a href="#/all/cities" class="gray-badge">${item.city.trim()}</a>`;
            }
            if (item.brand) {
                badgesHtml += `<a href="#/all/brands" class="gray-badge">${item.brand.trim()}</a>`;
            }
            if (item.isClub === "是" || item.isClub === "慢") {
                badgesHtml += `<a href="#/club" class="gray-badge">飲水機研究社</a>`;
            }
            badgesContainer.innerHTML = badgesHtml || `<span style="color:#aaa;">-</span>`;

            let roleText = "";
            if (item.clubRole) { roleText = `<span class="badge">👑 社團${item.clubRole}</span>`;
            } else if (item.isClub === "是" || item.isClub === "慢") { roleText = `<span class="badge">🥤 社團成員</span>`;
            }

            const sortedData = [...rawData].sort((a, b) => parseFollowersCount(b.followers) - parseFollowersCount(a.followers));
            const rankIndex = sortedData.findIndex(u => u.id === userId);
            let rankText = rankIndex === 0 ? "🥇 粉絲數冠軍" : rankIndex === 1 ? "🥈 粉絲數亞軍" : rankIndex === 2 ? "🥉 粉絲數季軍" : "";
            const titleParts = [];
            if (roleText) titleParts.push(roleText);
            if (rankText) titleParts.push(rankText);
            if (item.title && item.title !== "無") titleParts.push(item.title);
            document.getElementById('det-title').innerHTML = titleParts.length > 0 ? titleParts.join('<br>') : "無";
            document.getElementById('det-followers').innerText = item.followers || "0";
            
            document.getElementById('det-time').innerText = item.updateTime || "-";
            document.getElementById('det-join-time').innerText = item.createTime ? item.createTime.substring(0, 10) : "-";
        }

        window.addEventListener('hashchange', handleRouting);
        fetchInitialData();
    </script>
</body>
</html>
